name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        run: |
          # Create artifact directly using GitHub's API
          echo "::group::Uploading artifact"
          tar -czf /tmp/artifact.tar.gz -C build .
          node -e "
            const fs = require('fs');
            const path = require('path');
            const artifact = fs.readFileSync('/tmp/artifact.tar.gz');
            
            console.log('Artifact created, size: ' + (artifact.length / 1024 / 1024).toFixed(2) + ' MB');
            
            fs.mkdirSync(path.join(process.env.RUNNER_TEMP, 'artifact-upload'), { recursive: true });
            fs.writeFileSync(path.join(process.env.RUNNER_TEMP, 'artifact-upload', 'artifact.tar.gz'), artifact);
            
            console.log('Artifact prepared for upload');
          "
          echo "::endgroup::"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v1
